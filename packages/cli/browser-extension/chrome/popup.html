<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MoonCode Bridge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap');

    :root {
      --bg: oklch(12% 0.006 260);
      --surface: oklch(17% 0.008 260);
      --fg: oklch(96% 0.004 260);
      --muted: oklch(66% 0.01 260);
      --border: oklch(27% 0.008 260);
      --accent: oklch(68% 0.14 245);
      
      --success: oklch(69% 0.16 142);
      --success-bg: oklch(69% 0.16 142 / 0.1);
      --danger: oklch(62% 0.19 28);
      --danger-bg: oklch(62% 0.19 28 / 0.15);
    }

    * {
      box-sizing: border-box;
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      background-color: var(--bg);
      color: var(--fg);
      padding: 16px;
      font-size: 13px;
      line-height: 1.5;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-size: 18px;
      color: var(--accent);
      font-weight: 700;
      line-height: 1;
    }

    .title-group h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .title-group p {
      font-size: 10px;
      color: var(--muted);
    }

    .status-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid transparent;
    }

    .status-badge.connected {
      background: var(--success-bg);
      color: var(--success);
      border-color: oklch(69% 0.16 142 / 0.2);
    }

    .status-badge.offline {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: oklch(62% 0.19 28 / 0.2);
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .port-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-height: 160px;
      overflow-y: auto;
      margin-bottom: 16px;
      padding-right: 2px;
    }

    .port-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .port-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .port-number {
      font-weight: 500;
    }

    .port-status-tag {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .port-status-tag.active {
      color: var(--success);
    }

    .port-status-tag.scanning {
      color: var(--muted);
    }

    .btn-terminate-port {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--danger);
      padding: 2px 6px;
      font-size: 10px;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-terminate-port:hover {
      background: var(--danger-bg);
      border-color: oklch(62% 0.19 28 / 0.3);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.15s ease;
    }

    .btn:hover {
      background: oklch(21% 0.008 260);
      border-color: oklch(35% 0.008 260);
    }

    .btn-primary {
      background: var(--fg);
      color: var(--bg);
      border: none;
      font-weight: 600;
    }

    .btn-primary:hover {
      background: oklch(90% 0.004 260);
    }

    .btn-danger {
      color: var(--danger);
      border-color: oklch(62% 0.19 28 / 0.2);
    }

    .btn-danger:hover {
      background: var(--danger-bg);
      border-color: oklch(62% 0.19 28 / 0.3);
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <span class="logo">☾</span>
      <div class="title-group">
        <h1>MoonCode</h1>
        <p>Browser Bridge</p>
      </div>
    </div>
    <span id="overall-status" class="status-badge offline">Offline</span>
  </div>

  <div class="section-title">Active Ports</div>
  <div id="port-list" class="port-list"></div>

  <div class="actions">
    <button class="btn btn-primary" id="reconnect-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 11-.57-8.38l5.67-5.67"/></svg>
      Rescan Ports
    </button>
    <button class="btn" id="dashboard-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/></svg>
      Open Bridge Console
    </button>
    <button class="btn btn-danger" id="close-all-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18.36 6.64a9 9 0 11-12.73 0M12 2v10"/></svg>
      Terminate All Sessions
    </button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
