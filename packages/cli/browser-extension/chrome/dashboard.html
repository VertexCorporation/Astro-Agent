<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Astro-Agent | Bridge Console</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Geist:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg: oklch(12% 0.006 260);
      --surface: oklch(17% 0.008 260);
      --surface-hover: oklch(21% 0.008 260);
      --fg: oklch(96% 0.004 260);
      --muted: oklch(66% 0.01 260);
      --border: oklch(27% 0.008 260);
      --accent: oklch(68% 0.14 245);
      
      --success: oklch(69% 0.16 142);
      --success-bg: oklch(69% 0.16 142 / 0.15);
      --danger: oklch(62% 0.19 28);
      --danger-bg: oklch(62% 0.19 28 / 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
      transition: background-color 0.2s, border-color 0.2s, transform 0.2s;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background-color: oklch(14% 0.007 260);
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-box {
      width: 32px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: var(--accent);
      font-size: 16px;
    }

    .brand-text h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-text p {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .refresh-btn {
      background-color: var(--fg);
      color: var(--bg);
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .refresh-btn:hover {
      background-color: oklch(90% 0.004 260);
    }

    /* Main Content */
    .container {
      max-width: 1200px;
      width: 100%;
      margin: 40px auto;
      padding: 0 24px;
      flex: 1;
    }

    /* Stats Section */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
    }

    .stat-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      font-family: 'Geist Mono', monospace;
    }

    /* Sessions Section */
    .section-header {
      margin-bottom: 20px;
    }

    .section-header h2 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .section-header p {
      font-size: 13px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .node-card {
      background-color: var(--surface);
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .node-card.active {
      border-color: oklch(35% 0.008 260);
    }

    .node-card.active::before {
      content: '';
      position: absolute;
      top: 12px;
      right: 12px;
      width: 8px;
      height: 8px;
      background-color: var(--success);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--success);
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .port-label {
      font-family: 'Geist Mono', monospace;
      font-size: 18px;
      font-weight: 700;
    }

    .node-details {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .detail-key {
      color: var(--muted);
    }

    .detail-val {
      font-family: 'Geist Mono', monospace;
      font-weight: 500;
    }

    .capabilities {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .cap-tag {
      font-size: 9px;
      font-weight: 500;
      padding: 2px 6px;
      background-color: oklch(21% 0.008 260);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      text-transform: uppercase;
      font-family: 'Geist Mono', monospace;
    }

    .terminate-btn {
      margin-top: 16px;
      width: 100%;
      background-color: var(--danger-bg);
      border: 1px solid oklch(62% 0.19 28 / 0.2);
      color: var(--danger);
      padding: 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.02em;
    }

    .terminate-btn:hover {
      background-color: var(--danger);
      color: var(--bg);
      border-color: transparent;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spinning {
      animation: rotate 0.8s linear infinite;
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="brand">
      <div class="logo-box">☾</div>
      <div class="brand-text">
        <h1>Astro-Agent</h1>
        <p>Console</p>
      </div>
    </div>
    <button class="refresh-btn" id="refresh-btn">
      <svg id="sync-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path>
      </svg>
      Scan Ports
    </button>
  </nav>

  <main class="container">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-title">Active Sessions</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
        </div>
        <div class="stat-value" id="active-nodes">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-title">Total Clients</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </div>
        <div class="stat-value" id="total-clients">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-header">
          <span class="stat-title">System Status</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        </div>
        <div class="stat-value" style="color: var(--success);">Operational</div>
      </div>
    </div>

    <div class="section-header">
      <h2>Bridge Nodes</h2>
      <p>Connection status of detected Astro-Agent ports</p>
    </div>

    <div class="grid" id="nodes-grid"></div>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
